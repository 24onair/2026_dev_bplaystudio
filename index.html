<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>손성훈 천대</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --bg-color-1: #6ee7b7;
            --bg-color-2: #a7f3d0;
            --bg-color-3: #d1fae5;
            --text-gradient-1: #064e3b;
            --text-gradient-2: #047857;
            --text-gradient-3: #0f766e;
        }

        body,
        html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-color-3), var(--bg-color-1), var(--bg-color-2));
            background-size: 400% 400%;
            color: #064e3b;
            overflow: hidden;
            animation: gradientBG 15s ease infinite;
        }

        .container {
            text-align: center;
            padding: 4rem 5rem;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 32px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: containerEntrance 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(40px) scale(0.9);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 48px 0 rgba(0, 0, 0, 0.15);
        }

        h1 {
            font-size: 40pt;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin: 0;
            background: linear-gradient(to right,
                    var(--text-gradient-1),
                    var(--text-gradient-2),
                    var(--text-gradient-3),
                    var(--text-gradient-2),
                    var(--text-gradient-1));
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShine 4s linear infinite reverse;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s ease;
            display: inline-block;
        }

        h1.pop {
            transform: scale(1.15) translateY(-5px);
            opacity: 0.5;
        }

        .subtitle {
            margin-top: 2rem;
            font-size: 1.2rem;
            color: #065f46;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.2s forwards;
        }

        @keyframes containerEntrance {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes gradientShine {
            to {
                background-position: 200% center;
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .btn-next {
            margin-top: 2.5rem;
            padding: 1rem 2.5rem;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #f97316, #fb923c, #ea580c);
            background-size: 200% 200%;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(234, 88, 12, 0.3);
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .btn-next:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 28px rgba(234, 88, 12, 0.5);
            background-position: 100% 50%;
        }

        .btn-next:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 4px 12px rgba(234, 88, 12, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 id="main-title">손성훈 천대</h1>
        <div class="subtitle">B-Play Studio Development Started</div>
        <button id="next-btn" class="btn-next">다음 문장 보기</button>
    </div>

    <script>
        const sentences = [
            "오늘은 굿",
            "내일도 굿",
            "언제나 행복",
            "원하는건 바로지금"
        ];
        const btnColors = [
            "linear-gradient(135deg, #8b5cf6, #a78bfa, #7c3aed)", /* Purple */
            "linear-gradient(135deg, #ec4899, #f472b6, #db2777)", /* Pink */
            "linear-gradient(135deg, #3b82f6, #60a5fa, #2563eb)", /* Blue */
            "linear-gradient(135deg, #10b981, #34d399, #059669)", /* Emerald */
            "linear-gradient(135deg, #f97316, #fb923c, #ea580c)"  /* Initial Orange */
        ];
        let currentIndex = 0;
        let colorIndex = 0;

        const nextBtn = document.getElementById('next-btn');
        const mainTitle = document.getElementById('main-title');

        nextBtn.addEventListener('click', () => {
            // Apply text pop animation (growing)
            mainTitle.classList.add('pop');

            // Change button color
            nextBtn.style.background = btnColors[colorIndex];
            colorIndex = (colorIndex + 1) % btnColors.length;

            // Wait for text to peak in size, swap contents, then shrink back down
            setTimeout(() => {
                mainTitle.innerText = sentences[currentIndex];
                currentIndex = (currentIndex + 1) % sentences.length;
                mainTitle.classList.remove('pop');
            }, 200); // 200ms delay perfectly syncs with 0.2s transition
        });
    </script>
</body>

</html>
